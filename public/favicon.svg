<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0a0a0f" rx="4"/>
  <!-- Grid lines -->
  <line x1="0" y1="16" x2="32" y2="16" stroke="#00f0ff" stroke-width="0.4" opacity="0.3"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#00f0ff" stroke-width="0.4" opacity="0.3"/>
  <!-- Stylized eye / cyborg icon -->
  <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#00f0ff" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="4" fill="#00f0ff" opacity="0.9"/>
  <circle cx="16" cy="16" r="2" fill="#0a0a0f"/>
  <!-- Circuit lines -->
  <line x1="6" y1="16" x2="2" y2="16" stroke="#ff00aa" stroke-width="1"/>
  <line x1="26" y1="16" x2="30" y2="16" stroke="#ff00aa" stroke-width="1"/>
  <circle cx="2" cy="16" r="1" fill="#ff00aa"/>
  <circle cx="30" cy="16" r="1" fill="#ff00aa"/>
  <!-- Top/bottom accents -->
  <line x1="10" y1="6" x2="22" y2="6" stroke="#b300ff" stroke-width="0.8" opacity="0.7"/>
  <line x1="10" y1="26" x2="22" y2="26" stroke="#b300ff" stroke-width="0.8" opacity="0.7"/>
</svg>
